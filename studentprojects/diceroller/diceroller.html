<!DOCTYPE HTML>
<html>

<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script src="js/diceroller.js"></script>
<link rel="stylesheet" type="text/css" href="css/diceroller.css">
</head>


<body>

<div id="leftside">
	<div class="div_floating" id="dicetray">
		<input type="image" onclick="addDice('D4')" class="image_dice_large" src="images\SiteD4.png" alt="D4"></input>
		<input type="image" onclick="addDice('D6')" class="image_dice_large" src="images\SiteD6.png" alt="D6"></input>
		<input type="image" onclick="addDice('D8')" class="image_dice_large" src="images\SiteD8.png" alt="D8"></input>
		<input type="image" onclick="addDice('D10')" class="image_dice_large" src="images\SiteD10.png" alt="D10"></input>
		<input type="image" onclick="addDice('D12')" class="image_dice_large" src="images\SiteD12.png" alt="D12"></input>
		<input type="image" onclick="addDice('D20')" class="image_dice_large" src="images\SiteD20.png" alt="D20"></input>
		<input type="image" onclick="addDice('D100')" class="image_dice_large" src="images\SiteD100.png" alt="D100"></input>
	</div>	

	<div id="dicegroups">
	</div>
	
</div>

<div id="middle">
	<div id="dicetext"><input id="dicetextfield" type="text"></input></div>

	<div id="dicecontainer"></div>
	
	<button onclick="rollDice()" class="button" name="rolldicebutton" value="Roll Dice" type="button">Roll Dice</button>
</div>

<div id="rightside">
	<div id="historycontainer">
	<textarea id="historytextarea"></textarea>
	</div>
</div>







</body>
</html>
