<!DOCTYPE HTML>
<html>

<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script src="../../global/bootstrap-3.3.7-dist/js/bootstrap.min.js"></script>
<script src="js/die.js"></script>
<script src="js/dicegroup.js"></script>
<script src="js/diceroller.js"></script>
<link rel="stylesheet" type="text/css" href="css/diceroller.css">
<link rel="stylesheet" href="../../global/bootstrap-3.3.7-dist/css/bootstrap.min.css"/>
<link rel="stylesheet" href="../../global/font-awesome-4.7.0/css/font-awesome.min.css">
</head>

<body>
<div class="container-fluid">
  <h3 class="text-primary text-center">Dice Roller 1.0</h3>
  <div class="row">
	<div class="col-xs-2">
		<div id="leftside" class="container_fluid div_floating_rightflat">
			<input type="image" onclick="addDice(4)" class="img-fluid image_dice_large" src="images\SiteD4.png" alt="D4"></input>
			<input type="image" onclick="addDice(6)" class="img-fluid image_dice_large" src="images\SiteD6.png" alt="D6"></input>
			<input type="image" onclick="addDice(8)" class="img-fluid image_dice_large" src="images\SiteD8.png" alt="D8"></input>
			<input type="image" onclick="addDice(10)" class="img-fluid image_dice_large" src="images\SiteD10.png" alt="D10"></input>
			<input type="image" onclick="addDice(12)" class="img-fluid image_dice_large" src="images\SiteD12.png" alt="D12"></input>
			<input type="image" onclick="addDice(20)" class="img-fluid image_dice_large" src="images\SiteD20.png" alt="D20"></input>
			<input type="image" onclick="addDice(100)" class="img-fluid image_dice_large" src="images\SiteD100.png" alt="D100"></input>
     		 </div>
      		<br>
		<br>
		<div id="dicegroups" class="well div_floating">

      		</div>
 	</div>


	<div class="col-xs-8">
	 <div id="middle" class="well div_floating">
		<div id="dicetext">
			<input id="dicetextfield" type="text" disabled="disabled"></input>
		</div>
		<div id="dicecontainer">
		</div>		
		<div id="buttoncontainer">
			<button onclick="rollDice()" id="rollbutton" class="btn-primary" name="rolldicebutton" value="Roll Dice" type="button">Roll Dice</button>
			<button onclick="clearDice()" id="clearbutton" class="btn-primary" name="cleardicebutton" value="Clear" type="button">Clear</button>
		</div>
       	 </div>	
	</div>
 
		
	<div class="col-xs-2">
		<div id="rightside" class="container-fluid" style="overflow-y: visible; margin: 0px; padding: 0px;">
				<textarea id="historytextarea" rows=44 disabled="disabled"></textarea>
		</div>
 	</div>
  </div>
</div>
</body>

</html>
