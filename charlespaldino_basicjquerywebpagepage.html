<!DOCTYPE HTML>
<html>
<head>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.10.2/jquery.min.js"></script>
<script src="js\basicjqueryscript.js"></script>
<link rel="stylesheet" type="text/css" href="css\basicjquerypage.css">
</head>


<body>
<div class="centerdiv">

	<div id="navdiv" class="navigation">
		<input id="navbutton" class="navbutton" type="button" onclick="navigateclick()" value="Show Major Cities"></input>	
	</div>

	<div id="errordiv" class="error_div">
		<p id="errortext"></p>
	</div>

	<div id="loadingdiv" class="loading_div">
		<img alt="Loading...Please Wait" class="loading_gif" src="img\loading.gif"></img>
	</div>

	<div id="infodiv" class="infodiv" style="visible: hidden;">
		<label id="textlabel">CURRENT CONDITIONS FOR:</label><br><br>
		<label id="citylabel"></label> (<label id="latlonglabel"></label>)<br><br>
		<label id="degreeslabel"></label><br><br>
		<img id="iconimg"><br><br>
		<label id="skieslabel"></label><br><br>
	</div>

	<div id="citiesinfodiv" class="cities_infodiv" style="visible: hidden;">		
		<table>
			<tr><td><p id="lap"></p></td>
			    <td><p id="lap_temp"></p></td>
			    <td><img id="lap_icon"></img></td>
			</tr>
			<tr><td><p id="ccp"></p></td>
			    <td><p id="ccp_temp"></p></td>
			    <td><img id="ccp_icon"></img></td>
			</tr>
			<tr><td><p id="pap"></p></td>
			    <td><p id="pap_temp"></p></td>
			    <td><img id="pap_icon"></img></td>
			</tr>
			<tr><td><p id="nycp"></p></td>
			    <td><p id="nycp_temp"></p></td>
			    <td><img id="nycp_icon"></img></td>
			</tr>
			<tr><td><p id="hsp"></p></td>
			    <td><p id="hsp_temp"></p></td>
			    <td><img id="hsp_icon"></img></td>
			</tr>
		</table> 
	</div>
</div>

</body>
</html>
